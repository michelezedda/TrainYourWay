<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>

    <!-- Circular clip -->
    <clipPath id="cl">
      <circle cx="32" cy="32" r="32"/>
    </clipPath>

    <!-- Background: deep indigo radial, light source top-left -->
    <radialGradient id="bg" cx="38%" cy="28%" r="72%">
      <stop offset="0%"   stop-color="#1d0d44"/>
      <stop offset="100%" stop-color="#060210"/>
    </radialGradient>

    <!-- K strokes: shared gradient top-left cyan to bottom-right violet -->
    <linearGradient id="kg" gradientUnits="userSpaceOnUse" x1="12" y1="8" x2="50" y2="56">
      <stop offset="0%"   stop-color="#22D3EE"/>
      <stop offset="48%"  stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>

    <!-- Glow bloom filter -->
    <filter id="halo" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4.5"/>
    </filter>

    <!-- Border ring gradient -->
    <linearGradient id="border-g" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="64" y2="64">
      <stop offset="0%"   stop-color="#22D3EE" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0.3"/>
    </linearGradient>

  </defs>

  <!-- Background -->
  <circle cx="32" cy="32" r="32" fill="url(#bg)"/>

  <!-- Ambient highlight top-left -->
  <ellipse cx="18" cy="14" rx="22" ry="16" fill="rgba(139,92,246,0.18)" clip-path="url(#cl)"/>

  <!-- K glow bloom -->
  <g clip-path="url(#cl)" filter="url(#halo)" opacity="0.75">
    <line x1="19" y1="11" x2="19" y2="53" stroke="url(#kg)" stroke-width="7" stroke-linecap="round"/>
    <line x1="23" y1="33" x2="48" y2="11" stroke="url(#kg)" stroke-width="7" stroke-linecap="round"/>
    <line x1="23" y1="31" x2="48" y2="53" stroke="url(#kg)" stroke-width="7" stroke-linecap="round"/>
  </g>

  <!-- K crisp layer -->
  <g clip-path="url(#cl)">
    <line x1="19" y1="11" x2="19" y2="53" stroke="url(#kg)" stroke-width="7" stroke-linecap="round"/>
    <line x1="23" y1="33" x2="48" y2="11" stroke="url(#kg)" stroke-width="7" stroke-linecap="round"/>
    <line x1="23" y1="31" x2="48" y2="53" stroke="url(#kg)" stroke-width="7" stroke-linecap="round"/>
  </g>

  <!-- Border ring -->
  <circle cx="32" cy="32" r="31" fill="none" stroke="url(#border-g)" stroke-width="1.3"/>

</svg>
